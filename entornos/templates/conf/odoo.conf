[options]
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo
; Per-environment random master password generated by bootstrap.sh
; (audit gotcha 2: never share the same admin_passwd across envs).
admin_passwd = __ADMIN_PASSWD__
; DB connection params. Used by the entrypoint (check_config) AND by direct
; invocations like `docker compose exec odoo odoo -d <db> ...` (tests).
db_host = __DB_HOST__
db_port = 5432
db_user = __DB_USER__
db_password = __DB_PASSWORD__
; Uncomment and tune for production-like local runs.
; dbfilter = ^dev_.*$
; list_db = True
; workers = 0
; max_cron_threads = 2
; limit_time_cpu = 60
; limit_time_real = 120
; log_level = info
; log_handler = [':INFO']
