# Generated by odoo-ai-ecosystem/entornos bootstrap (db: compose).
# Self-contained stack: Odoo + Postgres in the same compose project.
# Runtime values come from .env (never commit .env). Regenerate with
# `bootstrap.sh <project> <version> --force` to switch options.
services:
  odoo:
    container_name: "${ODOO_DEVELOPER}_${ODOO_PROJECT_NAME}"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ODOO_VERSION: "${ODOO_VERSION}.0"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_PORT}:8069"           # Odoo web
      - "${ODOO_LONGPOLL_PORT}:8072"  # longpolling / websockets
      - "${ODOO_DEBUG_PORT}:3001"     # debugpy (VS Code attach)
    environment:
      - DB_PORT_5432_TCP_ADDR=${DB_PORT_5432_TCP_ADDR}
      - DB_PORT_5432_TCP_PORT=${DB_PORT_5432_TCP_PORT}
      - DB_ENV_POSTGRES_USER=${DB_ENV_POSTGRES_USER}
      - DB_ENV_POSTGRES_PASSWORD=${DB_ENV_POSTGRES_PASSWORD}
    volumes:
      # Project root is mounted as extra-addons. Every top-level folder with an
      # __manifest__.py becomes an installable module.
      - ./:/mnt/extra-addons:delegated
      - ./conf:/etc/odoo:delegated
      # Named volume namespaced per project so parallel envs never collide
      # (audit gotcha 3). Keeps the filestore between `down` runs.
      - __PROJECT___odoo_data:/var/lib/odoo:cached
      # Optional Enterprise sources, read-only (bootstrap.sh --enterprise-path
      # or uncomment and set ENTERPRISE_PATH in .env):
      #ENTERPRISE#- ${ENTERPRISE_PATH}:/mnt/enterprise:ro
    # Optional shared network, e.g. to expose this stack to other dev stacks.
    # Create it once on the host:  docker network create odoo_shared_network
    # Enable with bootstrap.sh --shared-network (or uncomment the marked lines).
    #SHARED_NETWORK#networks:
    #SHARED_NETWORK#  - default
    #SHARED_NETWORK#  - odoo_shared_network

  db:
    image: postgres:15
    container_name: "${ODOO_DEVELOPER}_${ODOO_PROJECT_NAME}_db"
    environment:
      POSTGRES_USER: ${DB_ENV_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_ENV_POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    # Postgres is NOT published to the host on purpose; reach it through
    # `docker compose exec db psql/createdb/dropdb ...`.
    volumes:
      - __PROJECT___pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ENV_POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  __PROJECT___odoo_data:
  __PROJECT___pg_data:

#SHARED_NETWORK#networks:
#SHARED_NETWORK#  default:
#SHARED_NETWORK#  odoo_shared_network:
#SHARED_NETWORK#    external: true
