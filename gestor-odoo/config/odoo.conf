[options]
; Configuración de la instancia gestora (Odoo 19 Enterprise, contenedor dedicado).
; Montada en /etc/odoo por docker-compose: editar aquí y reiniciar, sin rebuild.

; Addons base de la imagen + Enterprise montado en solo lectura
addons_path = /mnt/extra-addons,/mnt/enterprise
data_dir = /var/lib/odoo

; Contraseña maestra (gestión de bases de datos). CAMBIAR antes del primer arranque
; y mantener sincronizada con ODOO_MASTER_PASSWORD del .env (solo referencia).
admin_passwd = cambiame_master_password

; Solo la base "gestor" es visible y servida
db_name = gestor
dbfilter = ^gestor$
list_db = False

; Detrás de proxy inverso si se publica más adelante; inocuo en acceso local directo
proxy_mode = True

; Instancia pequeña de gestión en WSL con 15 GB compartidos: recursos modestos
workers = 2
max_cron_threads = 1
limit_memory_soft = 1073741824
limit_memory_hard = 1342177280
limit_time_cpu = 120
limit_time_real = 240

; Limitar conexiones al postgres dedicado
db_maxconn = 16
